[workspace]
resolver = "2"
members = [
    "examples/auv3-demo",
    "examples/clap-demo",
    "examples/demo",
    "examples/vst3-demo",
    "nih_plug_slint",
    "plugin-canvas",
    "xtask",
]

[workspace.dependencies]
cursor-icon = "1.1"
nih_plug = { git = "https://github.com/robbert-vdh/nih-plug/" }
nih_plug_slint = { path = "nih_plug_slint" }
objc2 = { version = "0.5", features = ["verify"] }
plugin-canvas = { path = "plugin-canvas" }
raw-window-handle = "0.5"
slint = { version = "=1.3.2", default-features = false, features = ["accessibility", "compat-1-2", "std"] }

# Internal slint crate versions need to be pinned
# since they don't maintain semver compatibility
i-slint-core = "=1.3.2"
i-slint-renderer-skia = { version = "=1.3.2", features = ["x11"] }

[workspace.dependencies.icrate]
version = "0.1"
features = [
    "AppKit",
    "AppKit_NSCursor",
    "AppKit_NSEvent",
    "AppKit_NSPasteboard",
    "AppKit_NSPasteboardItem",
    "AppKit_NSScreen",
    "AppKit_NSTrackingArea",
    "AppKit_NSView",
    "AppKit_NSWindow",
    "Foundation_NSArray",
    "Foundation_NSAttributedString",
    "Foundation_NSData",
    "Foundation_NSInvocationOperation",
    "Foundation_NSNumber",
    "Foundation_NSOperationQueue",
    "Foundation_NSString",
    "Foundation_NSThread",
    "Foundation_NSURL",
]
